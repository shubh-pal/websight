<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebSight</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090c;
      --bg-1:     #0f0f14;
      --bg-2:     #16161d;
      --bg-3:     #1d1d27;
      --border:   rgba(255,255,255,0.07);
      --border-2: rgba(255,255,255,0.12);
      --violet:   #7c6af7;
      --violet-b: #a897ff;
      --cyan:     #00d4e8;
      --green:    #1ef5a0;
      --red:      #f5234a;
      --text:     #e2e2ee;
      --text-2:   #9696b0;
      --text-3:   #52526a;
      --mono:     'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 28px; height: 28px;
      background: var(--violet);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { display: block; }
    .title { font-weight: 700; font-size: 16px; letter-spacing: -0.02em; }
    .badge {
      margin-left: auto;
      font-size: 10px;
      color: var(--violet-b);
      background: rgba(124,106,247,0.12);
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: var(--mono);
    }

    /* Body */
    .body { padding: 16px; }

    /* Site info */
    .site-info {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .site-favicon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .site-title { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .site-url { font-size: 10px; color: var(--text-3); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Framework */
    .section-label {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-family: var(--mono);
      margin-bottom: 6px;
    }
    .fw-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .fw-btn {
      flex: 1;
      padding: 7px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .fw-btn.active {
      background: rgba(124,106,247,0.12);
      border-color: rgba(124,106,247,0.4);
      color: var(--violet-b);
    }

    /* Capture button */
    .capture-btn {
      width: 100%;
      padding: 11px;
      background: var(--violet);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      margin-bottom: 10px;
    }
    .capture-btn:hover { background: #9080ff; }
    .capture-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .open-app-btn {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .open-app-btn:hover { color: var(--text); border-color: var(--border-2); }

    /* Status */
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: var(--mono);
      display: none;
      align-items: flex-start;
      gap: 8px;
    }
    .status.visible { display: flex; }
    .status.running  { background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.2); color: var(--violet-b); }
    .status.done     { background: rgba(30,245,160,0.08); border: 1px solid rgba(30,245,160,0.2); color: var(--green); }
    .status.error    { background: rgba(245,35,74,0.08);  border: 1px solid rgba(245,35,74,0.2);  color: var(--red); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .status.running .status-dot { background: var(--violet-b); animation: pulse 1.2s infinite; }
    .status.done    .status-dot { background: var(--green); }
    .status.error   .status-dot { background: var(--red); }

    .view-result-btn {
      display: none;
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: var(--green);
      color: #0a0a0f;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .view-result-btn.visible { display: block; }

    /* Footer */
    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-hint { font-size: 10px; color: var(--text-3); }
    .settings-link { font-size: 10px; color: var(--violet-b); cursor: pointer; text-decoration: none; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4 8h8M8 4v8" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/>
        <circle cx="8" cy="8" r="2" fill="#fff"/>
      </svg>
    </div>
    <span class="title">WebSight</span>
    <span class="badge">AI</span>
  </div>

  <div class="body">
    <div class="site-info">
      <img class="site-favicon" id="favicon" src="" alt="" />
      <div style="overflow:hidden">
        <div class="site-title" id="siteTitle">Loading…</div>
        <div class="site-url"   id="siteUrl"></div>
      </div>
    </div>

    <div class="section-label">Output framework</div>
    <div class="fw-row">
      <button class="fw-btn active" id="fw-react"   onclick="setFw('react')">⚛ React + Vite</button>
      <button class="fw-btn"        id="fw-angular" onclick="setFw('angular')">🅰 Angular</button>
    </div>

    <button class="capture-btn" id="captureBtn" onclick="capture()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Capture &amp; Redesign
    </button>

    <button class="open-app-btn" onclick="openApp()">Open WebSight App ↗</button>

    <div class="status" id="status">
      <div class="status-dot"></div>
      <span id="statusMsg">Capturing page…</span>
    </div>

    <button class="view-result-btn" id="viewResultBtn" onclick="viewResult()">
      View Result →
    </button>
  </div>

  <div class="footer">
    <span class="footer-hint">Sends to localhost:3001</span>
    <a class="settings-link" id="settingsLink">⚙ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
