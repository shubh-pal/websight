<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Puter API Test</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #0f0f0f; color: #e5e5e5; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    h2 { font-size: 1rem; color: #a78bfa; margin: 0 0 12px; }
    button { background: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-right: 8px; }
    button:hover { background: #6d28d9; }
    button:disabled { background: #444; cursor: not-allowed; }
    .output { margin-top: 12px; background: #111; border-radius: 8px; padding: 12px; font-size: 0.85rem; white-space: pre-wrap; min-height: 40px; border: 1px solid #222; }
    .output.success { border-color: #22c55e44; }
    .output.error { border-color: #ef444444; color: #f87171; }
    img.result { max-width: 100%; border-radius: 8px; margin-top: 12px; }
    .status { display: inline-block; font-size: 0.75rem; padding: 2px 8px; border-radius: 999px; margin-left: 8px; }
    .pending { background: #444; color: #aaa; }
    .ok { background: #14532d; color: #4ade80; }
    .fail { background: #450a0a; color: #f87171; }
  </style>
</head>
<body>
  <h1>🧪 Puter.js API Test</h1>

  <!-- Test 1: Claude -->
  <div class="card">
    <h2>1. Claude (claude-3-5-sonnet) <span id="claude-status" class="status pending">pending</span></h2>
    <button onclick="testClaude()">Test Claude</button>
    <div class="output" id="claude-out">Click to test…</div>
  </div>

  <!-- Test 2: GPT-4o -->
  <div class="card">
    <h2>2. GPT-4o <span id="gpt-status" class="status pending">pending</span></h2>
    <button onclick="testGPT()">Test GPT-4o</button>
    <div class="output" id="gpt-out">Click to test…</div>
  </div>

  <!-- Test 3: Image Generation (DALL-E 3) -->
  <div class="card">
    <h2>3. Image Gen — DALL-E 3 <span id="dalle-status" class="status pending">pending</span></h2>
    <button onclick="testDalle()">Generate Image</button>
    <div class="output" id="dalle-out">Click to test…</div>
    <div id="dalle-img"></div>
  </div>

  <!-- Test 4: Image Generation (Flux Schnell) -->
  <div class="card">
    <h2>4. Image Gen — Flux.1-Schnell <span id="flux-status" class="status pending">pending</span></h2>
    <button onclick="testFlux()">Generate Image</button>
    <div class="output" id="flux-out">Click to test…</div>
    <div id="flux-img"></div>
  </div>

  <script>
    function setStatus(id, type, msg) {
      const el = document.getElementById(id);
      el.className = `status ${type}`;
      el.textContent = msg;
    }

    async function testClaude() {
      const out = document.getElementById('claude-out');
      out.textContent = '⏳ Calling puter.ai.chat with claude-3-5-sonnet…';
      out.className = 'output';
      setStatus('claude-status', 'pending', 'testing…');
      try {
        const start = Date.now();
        const resp = await puter.ai.chat('Say "Puter Claude API works!" and nothing else.', { model: 'claude-3-5-sonnet' });
        const elapsed = ((Date.now() - start) / 1000).toFixed(2);
        const text = typeof resp === 'string' ? resp : resp?.message?.content?.[0]?.text || JSON.stringify(resp);
        out.textContent = `✅ Response (${elapsed}s):\n${text}`;
        out.className = 'output success';
        setStatus('claude-status', 'ok', '✓ works');
      } catch (e) {
        out.textContent = `❌ Error: ${e.message || JSON.stringify(e)}`;
        out.className = 'output error';
        setStatus('claude-status', 'fail', '✗ failed');
      }
    }

    async function testGPT() {
      const out = document.getElementById('gpt-out');
      out.textContent = '⏳ Calling puter.ai.chat with gpt-4o…';
      out.className = 'output';
      setStatus('gpt-status', 'pending', 'testing…');
      try {
        const start = Date.now();
        const resp = await puter.ai.chat('Say "Puter GPT-4o API works!" and nothing else.', { model: 'gpt-4o' });
        const elapsed = ((Date.now() - start) / 1000).toFixed(2);
        const text = typeof resp === 'string' ? resp : resp?.message?.content?.[0]?.text || resp?.message?.content || JSON.stringify(resp);
        out.textContent = `✅ Response (${elapsed}s):\n${text}`;
        out.className = 'output success';
        setStatus('gpt-status', 'ok', '✓ works');
      } catch (e) {
        out.textContent = `❌ Error: ${e.message || JSON.stringify(e)}`;
        out.className = 'output error';
        setStatus('gpt-status', 'fail', '✗ failed');
      }
    }

    async function testDalle() {
      const out = document.getElementById('dalle-out');
      out.textContent = '⏳ Generating image with dall-e-3… (may take 10–20s)';
      out.className = 'output';
      setStatus('dalle-status', 'pending', 'generating…');
      try {
        const start = Date.now();
        const result = await puter.ai.txt2img('A futuristic purple city skyline at night, minimalist, digital art', { model: 'dall-e-3' });
        const elapsed = ((Date.now() - start) / 1000).toFixed(2);
        out.textContent = `✅ Done (${elapsed}s). Image below:`;
        out.className = 'output success';
        setStatus('dalle-status', 'ok', '✓ works');
        const img = document.createElement('img');
        img.className = 'result';
        img.src = result.src || result;
        document.getElementById('dalle-img').appendChild(img);
      } catch (e) {
        out.textContent = `❌ Error: ${e.message || JSON.stringify(e)}`;
        out.className = 'output error';
        setStatus('dalle-status', 'fail', '✗ failed');
      }
    }

    async function testFlux() {
      const out = document.getElementById('flux-out');
      out.textContent = '⏳ Generating image with flux-schnell… (may take 10–20s)';
      out.className = 'output';
      setStatus('flux-status', 'pending', 'generating…');
      try {
        const start = Date.now();
        const result = await puter.ai.txt2img('A futuristic purple city skyline at night, minimalist, digital art', { model: 'flux-schnell' });
        const elapsed = ((Date.now() - start) / 1000).toFixed(2);
        out.textContent = `✅ Done (${elapsed}s). Image below:`;
        out.className = 'output success';
        setStatus('flux-status', 'ok', '✓ works');
        const img = document.createElement('img');
        img.className = 'result';
        img.src = result.src || result;
        document.getElementById('flux-img').appendChild(img);
      } catch (e) {
        out.textContent = `❌ Error: ${e.message || JSON.stringify(e)}`;
        out.className = 'output error';
        setStatus('flux-status', 'fail', '✗ failed');
      }
    }
  </script>
</body>
</html>
