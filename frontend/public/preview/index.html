<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stripe</title>
    <meta name="description" content="Stripe is a financial services platform that helps all types of businesses accept payments, build flexible billing models and manage money movement." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source%20Sans%203:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/index-CZULzyM-.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CoVgdZn5.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Puter.js: free AI image generation (user-pays model, no API key needed) -->
    <script src="https://js.puter.com/v2/"></script>
    <script>
      (function () {
        // Priority order: DALL-E 3 (best quality) → FLUX.1.1-pro (fast+sharp) → FLUX.1-kontext-max (fallback)
        var MODELS = ['dall-e-3', 'black-forest-labs/FLUX.1.1-pro', 'black-forest-labs/FLUX.1-kontext-max'];
        var modelIdx = 0;

        async function generateImg(img) {
          var prompt = img.getAttribute('data-ai-prompt');
          if (!prompt || img.getAttribute('data-ai-done')) return;
          img.setAttribute('data-ai-done', '1');

          // Loading shimmer
          img.style.transition = 'opacity 0.5s ease, filter 0.5s ease';
          img.style.opacity = '0.35';
          img.style.filter = 'blur(6px) saturate(0.3)';

          try {
            var result = await window.puter.ai.txt2img(prompt, { model: MODELS[modelIdx] });
            var src = (result && result.src) ? result.src : result;
            img.src = src;
            img.style.opacity = '1';
            img.style.filter = 'none';
          } catch (e) {
            // Try next model in fallback chain
            if (modelIdx < MODELS.length - 1) {
              modelIdx++;
              img.removeAttribute('data-ai-done');
              generateImg(img);
            } else {
              img.style.opacity = '1';
              img.style.filter = 'none';
              console.warn('[WebSight AI Images] All models failed:', e.message || e);
            }
          }
        }

        function runAll() {
          var imgs = document.querySelectorAll('img[data-ai-prompt]:not([data-ai-done])');
          imgs.forEach(function (img) { generateImg(img); });
        }

        // Run after React mounts (React needs ~1-2s to render)
        window.addEventListener('load', function () { setTimeout(runAll, 1800); });

        // Also watch for dynamically rendered images (SPA route changes, lazy renders)
        var observer = new MutationObserver(function () {
          clearTimeout(window.__wsImgTimer);
          window.__wsImgTimer = setTimeout(runAll, 600);
        });
        document.addEventListener('DOMContentLoaded', function () {
          observer.observe(document.body, { childList: true, subtree: true });
        });
      })();
    </script>
  </body>
</html>
